<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KinAya 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #FAFAF8; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ── Config ─────────────────────────────────────── */
const GLTF_PATH    = './studio_display_kin_aya.gltf';
const FRUSTUM_SIZE = 14;
const BASE_POS     = { x: -3.5, y: 7.7, z: 14.8 };
const BASE_ROT_X   = -8 * (Math.PI / 180); // -8°
const PARALLAX_STR = 0.012;  // how much the model shifts on hover
const LERP_SPEED   = 0.06;   // smoothing factor

/* ── Scene ──────────────────────────────────────── */
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0xFAFAF8);

/* ── Camera (orthographic) ──────────────────────── */
const aspect   = window.innerWidth / window.innerHeight;
const camera   = new THREE.OrthographicCamera(
  -FRUSTUM_SIZE * aspect / 2,
   FRUSTUM_SIZE * aspect / 2,
   FRUSTUM_SIZE / 2,
  -FRUSTUM_SIZE / 2,
  0.1, 200
);
camera.position.set(BASE_POS.x, BASE_POS.y, BASE_POS.z);
camera.rotation.x = BASE_ROT_X;

/* ── Renderer ───────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

/* ── Lighting ───────────────────────────────────── */
const ambient = new THREE.AmbientLight(0xffffff, 1.4);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(8, 14, 10);
key.castShadow = true;
key.shadow.mapSize.width  = 2048;
key.shadow.mapSize.height = 2048;
scene.add(key);

const fill = new THREE.DirectionalLight(0xd0e8f0, 0.8);
fill.position.set(-6, 4, 8);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 0.5);
rim.position.set(0, -4, -10);
scene.add(rim);

/* ── Load GLTF ──────────────────────────────────── */
const loader = new GLTFLoader();
let model = null;

loader.load(GLTF_PATH, (gltf) => {
  model = gltf.scene;

  // Centre the model
  const box    = new THREE.Box3().setFromObject(model);
  const centre = box.getCenter(new THREE.Vector3());
  model.position.sub(centre);

  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow    = true;
      child.receiveShadow = true;
    }
  });

  scene.add(model);
}, undefined, (err) => {
  console.error('GLTF load error:', err);
});

/* ── Mouse parallax ─────────────────────────────── */
const mouse  = { x: 0, y: 0 };   // normalised -1 → 1
const target = { x: 0, y: 0 };   // lerp target
const current = { x: 0, y: 0 };  // smoothed

document.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
});

/* ── Resize ─────────────────────────────────────── */
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const a = w / h;
  camera.left   = -FRUSTUM_SIZE * a / 2;
  camera.right  =  FRUSTUM_SIZE * a / 2;
  camera.top    =  FRUSTUM_SIZE / 2;
  camera.bottom = -FRUSTUM_SIZE / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

/* ── Animate ────────────────────────────────────── */
function animate() {
  requestAnimationFrame(animate);

  target.x = mouse.x * PARALLAX_STR;
  target.y = mouse.y * PARALLAX_STR;

  current.x += (target.x - current.x) * LERP_SPEED;
  current.y += (target.y - current.y) * LERP_SPEED;

  camera.position.x = BASE_POS.x + current.x * FRUSTUM_SIZE;
  camera.position.y = BASE_POS.y - current.y * FRUSTUM_SIZE * 0.4;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
